<article class="relative max-w-sm overflow-hidden rounded-2xl border border-teal-500/30 bg-black p-6 shadow-[0_0_15px_rgba(6,182,212,0.15)] transition-all duration-300 hover:-translate-y-1 hover:border-cyan-400 hover:shadow-[0_0_25px_rgba(6,182,212,0.35)]">
  
  <!-- Detalle decorativo futurista en la esquina superior derecha -->
  <div class="absolute right-0 top-0 h-12 w-12 bg-gradient-to-bl from-cyan-500/20 to-transparent opacity-70"></div>
  <div class="absolute right-2 top-2 h-1 w-6 bg-cyan-400"></div>
  <div class="absolute right-2 top-2 h-3 w-1 bg-cyan-400"></div>

  <!-- Encabezado con el nombre -->
  <header class="mb-5 relative">
    <span class="text-[10px] font-bold tracking-[0.2em] text-teal-400 uppercase block mb-1">
      Personaje: {{ character().id }}
    </span>
    <h3 class="text-2xl font-black tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-white via-slate-200 to-cyan-300 drop-shadow-[0_2px_8px_rgba(6,182,212,0.3)]">
      {{ character().name }}
    </h3>
  </header>

  <!-- Sección de Datos Técnicos (Grid Espacial) -->
  <section class="grid grid-cols-1 gap-3 text-xs tracking-wider font-semibold">
    
    <!-- MASA -->
    <div class="flex items-center justify-between rounded-xl border border-teal-900/50 bg-teal-950/20 p-3 backdrop-blur-sm transition-colors hover:border-teal-500/40">
      <div class="flex items-center gap-3">
        <span class="text-slate-400 uppercase text-[10px]">Peso</span>
      </div>
      <strong class="text-cyan-400 font-mono text-sm shadow-cyan-400/20 drop-shadow-[0_0_4px_currentColor]">
        {{ character().mass }} <span class="text-[10px] text-teal-500">KG</span>
      </strong>
    </div>
    
    <!-- ALTURA -->
    <div class="flex items-center justify-between rounded-xl border border-teal-900/50 bg-teal-950/20 p-3 backdrop-blur-sm transition-colors hover:border-teal-500/40">
      <div class="flex items-center gap-3">
        <span class="text-slate-400 uppercase text-[10px]">Altura</span>
      </div>
      <strong class="text-cyan-400 font-mono text-sm drop-shadow-[0_0_4px_currentColor]">
        {{ character().height }} <span class="text-[10px] text-teal-500">CM</span>
      </strong>
    </div>
    
    <!-- GÉNERO -->
    <div class="flex items-center justify-between rounded-xl border border-teal-900/50 bg-teal-950/20 p-3 backdrop-blur-sm transition-colors hover:border-teal-500/40">
      <div class="flex items-center gap-3">
        <span class="text-slate-400 uppercase text-[10px]">Género</span>
      </div>
      <strong class="text-teal-300 uppercase font-mono text-sm drop-shadow-[0_0_4px_currentColor]">
        {{ character().gender }}
      </strong>
    </div>

  </section>

  <!-- Botón de Acción / Escaneo -->
  <footer class="mt-6">
    <button 
      (click)="selected.emit(character().id)"
      class="group relative w-full overflow-hidden rounded-xl bg-gradient-to-r from-teal-600 to-cyan-600 px-4 py-3 text-center text-xs font-black uppercase tracking-[0.15em] text-black shadow-[0_0_15px_rgba(20,184,166,0.4)] transition-all hover:from-teal-400 hover:to-cyan-400 hover:shadow-[0_0_25px_rgba(6,182,212,0.6)] active:scale-[0.97] cursor-pointer">
      
      <!-- Efecto de brillo interior al pasar el mouse -->
      <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full group-hover:animate-[shimmer_1s_infinite]"></span>
      
      <span class="relative z-10 text-white font-bold tracking-[0.2em]">
        escanear
      </span>
    </button>
  </footer>

</article>
