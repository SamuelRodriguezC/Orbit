<article
  class="group relative overflow-hidden rounded-2xl border border-cyan-500/20 bg-black/90 p-5 transition-all duration-300 hover:-translate-y-1 hover:border-cyan-400/60"
>

  <!-- Línea futurista superior -->
  <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-cyan-400/70 to-transparent"></div>

  <!-- Header -->
  <header class="mb-5">

    <span
      class="mb-1 block text-[10px] font-bold uppercase tracking-[0.22em] text-cyan-400/80"
    >
      Personaje {{ character().id }}
    </span>

    <h3
      class="bg-gradient-to-r from-white via-slate-200 to-cyan-300 bg-clip-text text-2xl font-black tracking-wide text-transparent"
    >
      {{ character().name }}
    </h3>

  </header>

  <!-- Data -->
  <ul class="space-y-2 text-xs font-semibold tracking-wider">

    <li
      class="flex items-center justify-between rounded-xl border border-cyan-500/10 bg-cyan-500/[0.03] px-3 py-2 transition-colors duration-200 hover:border-cyan-400/30"
    >
      <span class="uppercase text-[10px] text-slate-400">
        Peso
      </span>

      <strong class="font-mono text-sm text-cyan-300">
        {{ character().mass }}
        <span class="text-[10px] text-cyan-500/70">KG</span>
      </strong>
    </li>

    <li
      class="flex items-center justify-between rounded-xl border border-cyan-500/10 bg-cyan-500/[0.03] px-3 py-2 transition-colors duration-200 hover:border-cyan-400/30"
    >
      <span class="uppercase text-[10px] text-slate-400">
        Altura
      </span>

      <strong class="font-mono text-sm text-cyan-300">
        {{ character().height }}
        <span class="text-[10px] text-cyan-500/70">CM</span>
      </strong>
    </li>

    <li
      class="flex items-center justify-between rounded-xl border border-cyan-500/10 bg-cyan-500/[0.03] px-3 py-2 transition-colors duration-200 hover:border-cyan-400/30"
    >
      <span class="uppercase text-[10px] text-slate-400">
        Género
      </span>

      <strong class="font-mono text-sm uppercase text-teal-300">
        {{ character().gender }}
      </strong>
    </li>

  </ul>

  <!-- Action -->
  <button
    (click)="selected.emit(character().id)"
    class="relative mt-5 w-full overflow-hidden rounded-xl bg-gradient-to-r from-teal-500 to-cyan-500 px-4 py-3 text-xs font-black uppercase tracking-[0.18em] text-black transition-all duration-300 hover:brightness-110 active:scale-[0.98]"
  >

    <!-- Shine -->
    <span
      class="absolute inset-0 translate-x-[-120%] bg-gradient-to-r from-transparent via-white/20 to-transparent transition-transform duration-700 group-hover:translate-x-[120%]"
    ></span>

    <span class="relative z-10 text-white">
      Escanear
    </span>

  </button>

</article>
