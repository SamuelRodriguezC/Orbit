<!-- 🚀 Content -->
@if (!loading() && !error()) {
  <section>

    <!-- 🎛️ CONTROLS (Centrado en el medio de la interfaz) -->
    <div class="flex items-center gap-4 mb-4 mt-5 p-4 rounded-xl border border-teal-500/20 bg-black/40 backdrop-blur-md mx-auto max-w-xs font-mono">
      
      <!-- Etiqueta del filtro -->
      <label class="text-xs font-bold tracking-[0.15em] text-teal-400 uppercase whitespace-nowrap flex items-center gap-1.5 select-none">
        <span class="inline-block w-1.5 h-1.5 bg-cyan-400 rounded-full animate-pulse"></span>
        Organizar Matrix:
      </label>

      <!-- Selector Desplegable Estilizado -->
      <div class="relative w-full">
        <select 
          (change)="onSortChange($any($event.target).value)"
          class="w-full appearance-none rounded-lg border border-teal-500/30 bg-black px-3 py-1.5 text-xs font-bold tracking-wider text-cyan-400 shadow-[0_0_10px_rgba(6,182,212,0.05)] outline-none transition-all duration-200 cursor-pointer hover:border-cyan-400 hover:text-cyan-300 hover:shadow-[0_0_15px_rgba(6,182,212,0.2)] focus:border-cyan-400 focus:shadow-[0_0_15px_rgba(6,182,212,0.3)]"
        >
          <option value="name" class="bg-slate-950 text-cyan-400">Nombre</option>
          <option value="height" class="bg-slate-950 text-cyan-400"> Altura</option>
          <option value="mass" class="bg-slate-950 text-cyan-400"> Masa</option>
        </select>
        
        <!-- Flecha personalizada decorativa en Cyan -->
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-2.5 text-teal-500">
          <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
          </svg>
        </div>
      </div>

    </div>

    <!-- 📄 Pagination (Superior) -->
    <app-pagination class="block mb-8"
      [currentPage]="page()"
      [totalPages]="totalPages()"
      (pageChange)="onPageChange($event)"
    />

    <!-- 🎴 GRID -->
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 justify-items-center items-center">
      @for (character of characters(); track character.id) {
        <app-character-card
          [character]="character"
          (selected)="goToDetail($event)"
          class="w-full max-w-sm" 
        />
      }
    </section>

    <!-- 📄 Pagination (Inferior) -->
    <app-pagination class="block mb-16 mt-5"
      [currentPage]="page()"
      [totalPages]="totalPages()"
      (pageChange)="onPageChange($event)"
    />

  </section>
}
