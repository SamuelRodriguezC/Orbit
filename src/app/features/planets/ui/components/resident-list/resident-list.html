@if (residents().length) {
  <ul class="flex flex-wrap gap-2">
    @for (
      resident of residents();
      track resident.id
    ) {
      <li
        class="px-3 py-1 rounded-full bg-cyan-500/10 border border-cyan-500/20 text-cyan-200 text-xs"
      >
        {{ resident.name }}
      </li>
    }
  </ul>
}

@else {
  <p class="text-slate-500 text-sm">
    Sin residentes registrados.
  </p>
}
