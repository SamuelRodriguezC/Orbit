<section class="space-y-8">

  <!-- HERO -->
  <header
    class="mx-auto max-w-3xl px-4 pt-6 text-center"
  >

    <!-- Badge -->
    <div
      class="mb-4 inline-flex items-center gap-2 rounded-full border border-emerald-500/20 bg-emerald-500/5 px-4 py-1"
    >
      <span
        class="h-2 w-2 rounded-full bg-emerald-400"
      ></span>

      <span
        class="text-[11px] font-bold uppercase tracking-[0.25em] text-emerald-300"
      >
        Base de datos de sistemas planetarios
      </span>
    </div>

    <!-- LCP -->
    <h1
      class="text-4xl font-black tracking-tight text-white md:text-5xl"
    >
      Conoce los

      <span class="text-cyan-300">
        Planetas
      </span>

      de la Galaxia
    </h1>

    <!-- Description -->
    <p
      class="mt-4 text-sm leading-relaxed text-slate-400 md:text-base"
    >
      Descubre mundos desérticos, sistemas helados y civilizaciones
      ocultas en los rincones más lejanos del universo.
    </p>

  </header>

  <!-- PAGINATION -->
  <app-pagination
    class="mb-10 block"
    [currentPage]="page()"
    [totalPages]="totalPages()"
    (pageChange)="onPageChange($event)"
  />

  <!-- GRID -->
  <app-planets-grid
    [planets]="planets()"
  />

</section>
