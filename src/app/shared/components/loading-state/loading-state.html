<section
  aria-label="Cargando contenido"
  class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"
>
  @for (item of [].constructor(rows()); track $index) {
    <article
      class="animate-pulse rounded-2xl border border-slate-800 bg-slate-900/50 p-5"
    >
      <div class="mb-4 h-5 w-2/3 rounded bg-slate-700"></div>

      <div class="space-y-2">
        <div class="h-4 rounded bg-slate-800"></div>
        <div class="h-4 w-5/6 rounded bg-slate-800"></div>
        <div class="h-4 w-4/6 rounded bg-slate-800"></div>
      </div>
    </article>
  }
</section>
