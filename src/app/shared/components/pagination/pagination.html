<nav
  aria-label="Pagination"
  class="flex items-center justify-center gap-2 relative z-10 select-none font-mono text-sm"
>
  
  <!-- Botón Anterior (Previous) -->
  <button
    type="button"
    (click)="previous()"
    [disabled]="currentPage() === 1"
    class="px-4 h-10 rounded-xl border-2 border-teal-500/30 bg-black text-teal-400 hover:border-cyan-400 hover:text-cyan-400 hover:shadow-[0_0_15px_rgba(6,182,212,0.3)] disabled:opacity-20 disabled:cursor-not-allowed disabled:hover:border-teal-500/30 disabled:hover:text-teal-400 disabled:hover:shadow-none transition-all duration-200 cursor-pointer"
  >
    ←
  </button>

  <!-- Primer Elemento (First Page Link) -->
  @if (currentPage() > 3) {
    <button
      type="button"
      (click)="goToPage(1)"
      class="h-10 w-10 rounded-xl border-2 border-teal-500/30 bg-black text-slate-400 hover:border-cyan-400 hover:text-cyan-400 transition-all duration-200 cursor-pointer"
    >
      01
    </button>

    <span class="text-teal-600/50 px-1 tracking-widest animate-pulse">...</span>
  }

  <!-- Páginas Dinámicas (Dynamic Pages) -->
  @for (page of visiblePages(); track page) {
    <button
      type="button"
      (click)="goToPage(page)"
      [attr.aria-current]="page === currentPage() ? 'page' : null"
      class="h-10 w-10 rounded-xl border-2 transition-all duration-200 cursor-pointer font-bold"
      [class.bg-gradient-to-b]="page === currentPage()"
      [class.from-cyan-500]="page === currentPage()"
      [class.to-teal-600]="page === currentPage()"
      [class.text-black]="page === currentPage()"
      [class.border-cyan-400]="page === currentPage()"
      [class.shadow-[0_0_15px_rgba(6,182,212,0.4)]]="page === currentPage()"
      [class.border-teal-500/30]="page !== currentPage()"
      [class.bg-black]="page !== currentPage()"
      [class.text-slate-400]="page !== currentPage()"
      [class.hover:border-cyan-400]="page !== currentPage()"
      [class.hover:text-cyan-400]="page !== currentPage()"
    >
      <!-- Le da un formato tipo código (ej: '02' en vez de '2') si el número es menor a 10 -->
      {{ page < 10 ? '0' + page : page }}
    </button>
  }

  <!-- Último Elemento (Last Page Link) -->
  @if (currentPage() < totalPages() - 2) {
    <span class="text-teal-600/50 px-1 tracking-widest animate-pulse">...</span>

    <button
      type="button"
      (click)="goToPage(totalPages())"
      class="h-10 w-10 rounded-xl border-2 border-teal-500/30 bg-black text-slate-400 hover:border-cyan-400 hover:text-cyan-400 transition-all duration-200 cursor-pointer"
    >
      {{ totalPages() < 10 ? '0' + totalPages() : totalPages() }}
    </button>
  }

  <!-- Botón Siguiente (Next) -->
  <button
    type="button"
    (click)="next()"
    [disabled]="currentPage() === totalPages()"
    class="px-4 h-10 rounded-xl border-2 border-teal-500/30 bg-black text-teal-400 hover:border-cyan-400 hover:text-cyan-400 hover:shadow-[0_0_15px_rgba(6,182,212,0.3)] disabled:opacity-20 disabled:cursor-not-allowed disabled:hover:border-teal-500/30 disabled:hover:text-teal-400 disabled:hover:shadow-none transition-all duration-200 cursor-pointer"
  >
    →
  </button>
</nav>
